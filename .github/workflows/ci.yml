name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  RUBY_VERSION_DEFAULT: '3.3'

jobs:
  # Job 1: Fast unit tests and linting (no Kubernetes needed)
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.1', '3.2', '3.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run Cookstyle
        run: bundle exec rake style

      - name: Run unit tests
        run: bundle exec rspec --format documentation

  # Job 2: Integration tests with kind cluster
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.2', '3.3']
        k8s-version:
          - v1.29.0
          - v1.30.0
          - v1.31.0

    steps:
      - name: Create kind cluster
        uses: container-tools/kind-action@v2
        with:
          version: v0.20.0
          kubectl_version: v1.30.0
          cluster_name: test-cluster
          wait: 60s

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl version

      - name: Create test pods
        run: |
          # Ubuntu pod (bash)
          kubectl run test-ubuntu --image=ubuntu:22.04 --restart=Never -- sleep 3600

          # Alpine pod (ash/sh)
          kubectl run test-alpine --image=alpine:3.18 --restart=Never -- sleep 3600

          # Wait for pods to be ready
          kubectl wait --for=condition=Ready pod/test-ubuntu --timeout=120s
          kubectl wait --for=condition=Ready pod/test-alpine --timeout=120s

          # Verify pods
          kubectl get pods

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Test plugin with real pods
        run: ruby test/scripts/test_live.rb
        env:
          KUBECONFIG: /home/runner/.kube/config

      - name: Install InSpec
        uses: actionshub/chef-install@main
        with:
          project: inspec

      - name: Test with InSpec
        run: |
          inspec detect -t k8s-container:///test-ubuntu/test-ubuntu
          inspec shell -t k8s-container:///test-alpine/test-alpine --command "command('whoami').stdout"

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pod test-ubuntu
          kubectl describe pod test-alpine
          kubectl logs test-ubuntu || true
          kubectl logs test-alpine || true

  # Job 3: Build and install gem
  gem-build:
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION_DEFAULT }}
          bundler-cache: true

      - name: Build gem
        run: gem build train-k8s-container.gemspec

      - name: Install gem locally
        run: gem install ./train-k8s-container-*.gem

      - name: Verify gem loads
        run: ruby -e "require 'train-k8s-container'; puts TrainPlugins::K8sContainer::VERSION"

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: train-k8s-container-gem-ruby-${{ env.RUBY_VERSION_DEFAULT }}
          path: train-k8s-container-*.gem
